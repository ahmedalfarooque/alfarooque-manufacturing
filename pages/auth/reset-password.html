<!DOCTYPE html>
<html lang="en">
<head>
<script>/* dark default, flash-free */(function(){var t=localStorage.getItem("theme");if(!t){t="dark";localStorage.setItem("theme","dark");}if(t==="light"){document.documentElement.classList.add("light");document.body&&document.body.classList.add("light");}var l=localStorage.getItem("language");if(l==="ar"){document.documentElement.lang="ar";document.documentElement.dir="rtl";}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Reset Password — AL FAROOQUE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/themes.css">
<link rel="stylesheet" href="/css/auth.css">
<link rel="icon" href="/assets/images/logo/IAA_LOGO.png" type="image/png">
<style>
  .afr-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .afr-card{max-width:430px;width:100%;padding:36px 32px;background:var(--bg-card-3);border:1px solid var(--bd-2);border-radius:var(--r-lg);box-shadow:var(--sh-lg);}
  .afr-head{text-align:center;margin-bottom:22px;}
  .afr-logo{width:60px;height:60px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);background:var(--bg-teal);border:1px solid var(--bd-teal);}
  .afr-logo img{width:38px;height:38px;}
  .afr-title{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--tx);margin:0 0 4px;}
  .afr-sub{font-size:13px;color:var(--tx-3);margin:0;}
  .afr-form{display:flex;flex-direction:column;gap:14px;}
</style>
</head>
<body>
<div class="bg-env"><div class="bg-grad"></div><div class="bg-grid"></div></div>
<div class="afr-wrap">
  <div class="afr-card">
    <div class="afr-head">
      <div class="afr-logo"><img src="/assets/images/logo/IAA_LOGO.png" alt="AL FAROOQUE" width="38" height="38"></div>
      <h1 class="afr-title" id="afrTitle">Set a new password</h1>
      <p class="afr-sub" id="afrSub">Choose a strong password for your account.</p>
    </div>
    <form class="afr-form" id="afrForm" novalidate>
      <div class="af-msg" id="afrMsg" hidden></div>
      <div class="af-field">
        <label class="af-label" for="afrPw" id="afrLbl1">New Password <span class="af-req">*</span></label>
        <div class="af-pass-wrap">
          <input class="af-input" id="afrPw" type="password" autocomplete="new-password" placeholder="••••••••" required>
          <button type="button" class="af-pass-toggle" id="afrToggle" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="af-field">
        <label class="af-label" for="afrPw2" id="afrLbl2">Confirm Password <span class="af-req">*</span></label>
        <input class="af-input" id="afrPw2" type="password" autocomplete="new-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="af-submit" id="afrSubmit">Update Password</button>
    </form>
  </div>
</div>

<script src="/js/auth/config.js"></script>
<script type="module">
  import AFAuth from '/js/auth/auth.js';
  const IS_AR = document.documentElement.lang === 'ar';
  const t = (en, ar) => IS_AR ? ar : en;
  const $ = id => document.getElementById(id);

  /* Localize */
  $('afrTitle').textContent = t('Set a new password','تعيين كلمة مرور جديدة');
  $('afrSub').textContent   = t('Choose a strong password for your account.','اختر كلمة مرور قوية لحسابك.');
  $('afrLbl1').innerHTML    = t('New Password','كلمة المرور الجديدة') + ' <span class="af-req">*</span>';
  $('afrLbl2').innerHTML    = t('Confirm Password','تأكيد كلمة المرور') + ' <span class="af-req">*</span>';
  $('afrSubmit').textContent= t('Update Password','تحديث كلمة المرور');

  const msg = $('afrMsg');
  function show(text, kind){ msg.textContent = text; msg.hidden = false; msg.className = 'af-msg af-msg--' + (kind||'error'); }

  $('afrToggle').addEventListener('click', function(){
    const i = $('afrPw'); i.type = i.type === 'password' ? 'text' : 'password';
  });

  if (!AFAuth.isConfigured()) {
    show(t('Authentication is not configured yet (see AUTH_SETUP.md).','المصادقة غير مُهيأة بعد.'), 'error');
  }

  $('afrForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const pw = $('afrPw').value, pw2 = $('afrPw2').value;
    if (!pw || pw.length < 8 || !/[A-Za-z]/.test(pw) || !/\d/.test(pw))
      return show(t('Password must be at least 8 characters and include a letter and a number.','يجب أن تكون كلمة المرور 8 أحرف على الأقل وتتضمن حرفاً ورقماً.'));
    if (pw !== pw2) return show(t('Passwords do not match.','كلمتا المرور غير متطابقتين.'));
    const btn = $('afrSubmit'); btn.disabled = true; btn.textContent = t('Updating…','جارٍ التحديث…');
    const res = await AFAuth.updatePassword(pw);
    btn.disabled = false; btn.textContent = t('Update Password','تحديث كلمة المرور');
    if (res.error) return show(res.error.message || t('Could not update password. The reset link may have expired.','تعذّر تحديث كلمة المرور. ربما انتهت صلاحية الرابط.'));
    show(t('Password updated! Redirecting to login…','تم تحديث كلمة المرور! جارٍ التحويل…'), 'success');
    setTimeout(function(){ location.replace('/products'); }, 1800);
  });
</script>
</body>
</html>
