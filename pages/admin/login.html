<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){document.documentElement.style.colorScheme='dark';})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Login — AL FAROOQUE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin/admin.css">
<link rel="icon" href="/assets/images/logo/IAA_LOGO.png" type="image/png">
</head>
<body class="admin-body">

<div class="ad-login-wrap">
  <div class="ad-login-card">
    <div class="ad-login-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 class="ad-login-title" id="stepTitle">Admin Sign In</h1>
    <p class="ad-login-sub" id="stepSub">AL FAROOQUE Manufacturing — Enterprise Admin Portal</p>

    <div id="msgBox" class="ad-msg ad-hidden"></div>

    <!-- STEP 1: email + password -->
    <form id="loginForm">
      <div class="ad-field">
        <label class="ad-label">Email</label>
        <input class="ad-input" id="email" type="email" autocomplete="username" required>
      </div>
      <div class="ad-field">
        <label class="ad-label">Password</label>
        <input class="ad-input" id="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="ad-btn" type="submit" id="loginBtn">Continue</button>
    </form>

    <!-- STEP 2: OTP -->
    <form id="otpForm" class="ad-hidden">
      <div class="ad-field">
        <label class="ad-label">6-Digit Code</label>
        <input class="ad-input ad-otp-input" id="otpCode" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" required>
      </div>
      <button class="ad-btn" type="submit" id="verifyBtn">Verify &amp; Sign In</button>
      <button class="ad-btn-ghost" type="button" id="resendBtn">Resend code</button>
      <button class="ad-login-back" type="button" id="backBtn">&larr; Back to email &amp; password</button>
    </form>
  </div>
</div>

<script src="/js/admin/login.js"></script>
</body>
</html>
