<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){document.documentElement.style.colorScheme='dark';})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Dashboard — AL FAROOQUE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin/admin.css">
<link rel="icon" href="/assets/images/logo/IAA_LOGO.png" type="image/png">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
</head>
<body class="admin-body">

<div class="ad-shell">
  <!-- ═══ SIDEBAR ═══ -->
  <aside class="ad-side" id="adSide">
    <div class="ad-side-brand">
      <img src="/assets/images/logo/IAA_LOGO.png" alt="AL FAROOQUE" width="30" height="30">
      <div>
        <div class="ad-side-brand-text">AL FAROOQUE</div>
        <span class="ad-side-brand-tag">Admin Portal</span>
      </div>
    </div>
    <nav class="ad-nav" id="adNav">
      <div class="ad-nav-section-title">Overview</div>
      <button class="ad-nav-item" data-page="home"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></button>
      <button class="ad-nav-item" data-page="notifications"><i data-lucide="bell"></i><span>Notifications</span><span class="ad-nav-badge ad-hidden" id="navNotifBadge">0</span></button>

      <div class="ad-nav-section-title">Sales</div>
      <button class="ad-nav-item" data-page="orders"><i data-lucide="shopping-cart"></i><span>Orders</span></button>
      <button class="ad-nav-item" data-page="customers"><i data-lucide="users"></i><span>Customers</span></button>
      <button class="ad-nav-item" data-page="quotes"><i data-lucide="file-text"></i><span>Quotes</span></button>
      <button class="ad-nav-item is-soon" data-soon="Messages"><i data-lucide="mail"></i><span>Messages</span><span class="ad-nav-soon-tag">Soon</span></button>
      <button class="ad-nav-item is-soon" data-soon="Payments"><i data-lucide="credit-card"></i><span>Payments</span><span class="ad-nav-soon-tag">Soon</span></button>
      <button class="ad-nav-item is-soon" data-soon="Invoices"><i data-lucide="receipt"></i><span>Invoices</span><span class="ad-nav-soon-tag">Soon</span></button>

      <div class="ad-nav-section-title">Catalog</div>
      <button class="ad-nav-item" data-page="products"><i data-lucide="package"></i><span>Products</span></button>
      <button class="ad-nav-item" data-page="categories"><i data-lucide="layers"></i><span>Categories</span></button>
      <button class="ad-nav-item is-soon" data-soon="Inventory"><i data-lucide="warehouse"></i><span>Inventory</span><span class="ad-nav-soon-tag">Soon</span></button>
      <button class="ad-nav-item is-soon" data-soon="Production"><i data-lucide="factory"></i><span>Production</span><span class="ad-nav-soon-tag">Soon</span></button>

      <div class="ad-nav-section-title">Insights</div>
      <button class="ad-nav-item is-soon" data-soon="Reports"><i data-lucide="file-bar-chart"></i><span>Reports</span><span class="ad-nav-soon-tag">Soon</span></button>
      <button class="ad-nav-item is-soon" data-soon="Analytics"><i data-lucide="bar-chart-3"></i><span>Analytics</span><span class="ad-nav-soon-tag">Soon</span></button>

      <div class="ad-nav-section-title">System</div>
      <button class="ad-nav-item is-soon" data-soon="Website Settings"><i data-lucide="globe"></i><span>Website Settings</span><span class="ad-nav-soon-tag">Soon</span></button>
      <button class="ad-nav-item is-soon" data-soon="Users"><i data-lucide="user-cog"></i><span>Users</span><span class="ad-nav-soon-tag">Soon</span></button>
      <button class="ad-nav-item is-soon" data-soon="Roles &amp; Permissions"><i data-lucide="shield"></i><span>Roles &amp; Permissions</span><span class="ad-nav-soon-tag">Soon</span></button>
      <button class="ad-nav-item" data-page="audit"><i data-lucide="scroll-text"></i><span>Audit Logs</span></button>
      <button class="ad-nav-item is-soon" data-soon="Email Templates"><i data-lucide="mail-plus"></i><span>Email Templates</span><span class="ad-nav-soon-tag">Soon</span></button>
      <button class="ad-nav-item is-soon" data-soon="System Settings"><i data-lucide="settings"></i><span>System Settings</span><span class="ad-nav-soon-tag">Soon</span></button>
    </nav>
    <div class="ad-side-foot">
      <button class="ad-nav-item" data-page="account"><i data-lucide="user"></i><span>My Account</span></button>
      <button class="ad-nav-item ad-logout-btn" id="logoutBtn"><i data-lucide="log-out"></i><span>Logout</span></button>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <div>
    <header class="ad-topbar">
      <button class="ad-icon-btn ad-mobile-toggle" id="sideToggle" aria-label="Menu"><i data-lucide="menu"></i></button>
      <div class="ad-search-wrap">
        <i data-lucide="search"></i>
        <input class="ad-search-input" id="globalSearch" type="search" placeholder="Search orders, customers, products…">
      </div>
      <div class="ad-topbar-right">
        <span class="ad-clock" id="adClock">--:--:--</span>
        <button class="ad-icon-btn" id="notifBellBtn" aria-label="Notifications" data-page="notifications">
          <i data-lucide="bell"></i>
          <span class="ad-icon-badge ad-hidden" id="bellBadge">0</span>
        </button>
        <button class="ad-icon-btn" id="quickAddBtn" aria-label="Quick Actions" data-page="products">
          <i data-lucide="plus"></i>
        </button>
        <button class="ad-profile-btn" id="profileBtn" data-page="account">
          <span class="ad-profile-avatar" id="profileAvatar">··</span>
          <span class="ad-profile-name" id="profileName">Admin</span>
        </button>
      </div>
    </header>

    <main class="ad-content" id="adContent">
      <div class="ad-loading"><div class="ad-spinner"></div></div>
    </main>
  </div>
</div>

<script src="/js/admin/dashboard.js" type="module"></script>
</body>
</html>
