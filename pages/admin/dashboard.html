<!DOCTYPE html>
<html lang="en">
<head>
<script>
/* Pre-paint theme + language: apply .light / dir="rtl" before CSS loads
   so there is never a flash. Theme: explicit admin choice first, then the
   main site's saved theme, then the OS preference (system-followers keep
   following until they explicitly toggle). */
(function(){
  try{
    var t = localStorage.getItem('af-admin-theme') || localStorage.getItem('theme');
    if (t !== 'light' && t !== 'dark') {
      t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }
    document.documentElement.classList.toggle('light', t === 'light');
    document.documentElement.style.colorScheme = t;
    var l = localStorage.getItem('language') === 'ar' ? 'ar' : 'en';
    document.documentElement.lang = l;
    if (l === 'ar') document.documentElement.dir = 'rtl';
  }catch(e){ document.documentElement.style.colorScheme = 'dark'; }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Dashboard — AL FAROOQUE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="icon" href="/assets/images/logo/IAA_LOGO.png" type="image/png">
<!-- Glass icon system: sprite loader → lucide shim (defines window.lucide)
     → dashboard.js. Order matters. -->
<script src="/js/glass-icons.js"></script>
<script src="/js/admin/glass-lucide-shim.js"></script>
</head>

      <button class="ad-nav-item is-soon" data-soon="Inventory"><i data-lucide="warehouse"></i><span data-i18n="nav_inventory">Inventory</span><span class="ad-nav-soon-tag" data-i18n="soon">Soon</span></button>

    </nav>
    <div class="ad-side-foot">

      <button class="ad-nav-item ad-logout-btn" id="logoutBtn"><i data-lucide="log-out"></i><span data-i18n="nav_logout">Logout</span></button>

  <!-- ═══ MAIN ═══ -->

    <header class="ad-topbar">

      <div class="ad-search-wrap">
        <i data-lucide="search"></i>
        <input class="ad-search-input" id="globalSearch" type="search" placeholder="Search orders, customers, products…" data-i18n-ph="search_ph">
      </div>
      <div class="ad-topbar-right">
        <span class="ad-clock" id="adClock">--:--:--</span>
        <button class="ad-icon-btn" id="themeToggleBtn" aria-label="Toggle theme" data-i18n-aria="aria_theme">
          <i data-lucide="sun"></i>
        </button>
        <button class="ad-icon-btn" id="notifBellBtn" aria-label="Notifications" data-i18n-aria="aria_notifications" data-page="notifications">
          <i data-lucide="bell"></i>
          <span class="ad-icon-badge ad-hidden" id="bellBadge">0</span>
        </button>
        <button class="ad-icon-btn" id="quickAddBtn" aria-label="Quick Actions" data-i18n-aria="aria_quick_add" data-page="products">

        </button>

<script src="/js/admin/dashboard.js" type="module"></script>
