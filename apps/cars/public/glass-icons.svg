    <circle cx="48" cy="48" r="10" fill="none" stroke="url(#giInkGrad)" stroke-width="5" opacity="0.75"/>
    <circle cx="48" cy="48" r="3.6" fill="url(#giInkGrad)"/>
    <path d="M48 27a21 21 0 0 1 15 6" style="stroke:var(--gi-hl,#fff)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
