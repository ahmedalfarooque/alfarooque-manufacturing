<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" aria-hidden="true" focusable="false">
  <!-- ═══════════════════════════════════════════════════════════════
       AL FAROOQUE — 3D Glass Icon Family (single source of truth)
       Injected inline once per page by js/glass-icons.js so gradients,
       filters and CSS-variable tints work in every browser.

       Material recipe shared by every symbol (135° top-left light):
         .gi-base  — frosted squircle: tint gradient + light border
         .gi-ink   — icon silhouette: deeper tint gradient
         .gi-hi    — glass highlight streak (top-left ellipse)
       Tint comes from CSS vars set in css/glass-icons.css:
         --gi-t  (main tint)  --gi-t2 (deep tint)  --gi-hl (highlight)
       ═══════════════════════════════════════════════════════════════ -->
  <defs>
    <linearGradient id="giBaseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" style="stop-color:var(--gi-hl,#ffffff)" stop-opacity="0.55"/>
      <stop offset="0.45" style="stop-color:var(--gi-t,#8CA05B)" stop-opacity="0.22"/>
      <stop offset="1" style="stop-color:var(--gi-t2,#566440)" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="giInkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" style="stop-color:var(--gi-t,#8CA05B)"/>
      <stop offset="1" style="stop-color:var(--gi-t2,#566440)"/>
    </linearGradient>
    <linearGradient id="giEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" style="stop-color:var(--gi-hl,#ffffff)" stop-opacity="0.9"/>
      <stop offset="1" style="stop-color:var(--gi-hl,#ffffff)" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="giShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" style="flood-color:#20261A" flood-opacity="0.35"/>
    </filter>
    <filter id="giSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- shared glass plate -->
    <g id="giPlate">
      <rect x="8" y="8" width="80" height="80" rx="24" fill="url(#giBaseGrad)" filter="url(#giShadow)"/>
      <rect x="8.75" y="8.75" width="78.5" height="78.5" rx="23.4" fill="none" stroke="url(#giEdge)" stroke-width="1.5" opacity="0.85"/>
      <ellipse class="gi-hi" cx="34" cy="24" rx="24" ry="11" style="fill:var(--gi-hl,#ffffff)" opacity="0.32" filter="url(#giSoft)"/>
    </g>

    <linearGradient id="giBaseGradW" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" style="stop-color:var(--gi-hl,#ffffff)" stop-opacity="0.55"/>
      <stop offset="0.45" style="stop-color:var(--gw-t,#B08D57)" stop-opacity="0.24"/>
      <stop offset="1" style="stop-color:var(--gw-t2,#6E5230)" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="giInkGradW" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" style="stop-color:var(--gw-t,#B08D57)"/>
      <stop offset="1" style="stop-color:var(--gw-t2,#6E5230)"/>
    </linearGradient>
    <linearGradient id="giBaseGradS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" style="stop-color:var(--gi-hl,#ffffff)" stop-opacity="0.55"/>
      <stop offset="0.45" style="stop-color:var(--gs-t,#7E93A8)" stop-opacity="0.24"/>
      <stop offset="1" style="stop-color:var(--gs-t2,#46586B)" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="giInkGradS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" style="stop-color:var(--gs-t,#7E93A8)"/>
      <stop offset="1" style="stop-color:var(--gs-t2,#46586B)"/>
    </linearGradient>
    <linearGradient id="giBaseGradA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" style="stop-color:var(--gi-hl,#ffffff)" stop-opacity="0.55"/>
      <stop offset="0.45" style="stop-color:var(--ga-t,#8FB6C4)" stop-opacity="0.24"/>
      <stop offset="1" style="stop-color:var(--ga-t2,#4E7381)" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="giInkGradA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" style="stop-color:var(--ga-t,#8FB6C4)"/>
      <stop offset="1" style="stop-color:var(--ga-t2,#4E7381)"/>
    </linearGradient>

    <g id="giPlateW">
      <rect x="8" y="8" width="80" height="80" rx="24" fill="url(#giBaseGradW)" filter="url(#giShadow)"/>
      <rect x="8.75" y="8.75" width="78.5" height="78.5" rx="23.4" fill="none" stroke="url(#giEdge)" stroke-width="1.5" opacity="0.85"/>
      <ellipse cx="34" cy="24" rx="24" ry="11" style="fill:var(--gi-hl,#ffffff)" opacity="0.32" filter="url(#giSoft)"/>
    </g>
    <g id="giPlateS">
      <rect x="8" y="8" width="80" height="80" rx="24" fill="url(#giBaseGradS)" filter="url(#giShadow)"/>
      <rect x="8.75" y="8.75" width="78.5" height="78.5" rx="23.4" fill="none" stroke="url(#giEdge)" stroke-width="1.5" opacity="0.85"/>
      <ellipse cx="34" cy="24" rx="24" ry="11" style="fill:var(--gi-hl,#ffffff)" opacity="0.32" filter="url(#giSoft)"/>
    </g>
    <g id="giPlateA">
      <rect x="8" y="8" width="80" height="80" rx="24" fill="url(#giBaseGradA)" filter="url(#giShadow)"/>
      <rect x="8.75" y="8.75" width="78.5" height="78.5" rx="23.4" fill="none" stroke="url(#giEdge)" stroke-width="1.5" opacity="0.85"/>
      <ellipse cx="34" cy="24" rx="24" ry="11" style="fill:var(--gi-hl,#ffffff)" opacity="0.32" filter="url(#giSoft)"/>
    </g>
  </defs>

  <!-- ── Divisions ─────────────────────────────────────────────── -->
  <symbol id="gi-wood" viewBox="0 0 96 96">
    <use href="#giPlateW"/>
    <g fill="url(#giInkGradW)">
      <path d="M48 26 27 42v26a4 4 0 0 0 4 4h34a4 4 0 0 0 4-4V42L48 26z" opacity="0.92"/>
      <rect x="41" y="52" width="14" height="20" rx="2.5" style="fill:var(--gi-hl,#fff)" opacity="0.34"/>
    </g>
    <path d="M48 26 27 42h42L48 26z" style="fill:var(--gi-hl,#fff)" opacity="0.22"/>
  </symbol>

  <symbol id="gi-steel" viewBox="0 0 96 96">
