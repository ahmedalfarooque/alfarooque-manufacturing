      <line x1="48" y1="31" x2="48" y2="65"/>
      <line x1="31" y1="48" x2="65" y2="48"/>
    </g>
    <rect x="31" y="31" width="34" height="9" rx="4" style="fill:var(--gi-hl,#fff)" opacity="0.2"/>
  </symbol>

  <!-- ── About / values ────────────────────────────────────────── -->
  <symbol id="gi-target" viewBox="0 0 96 96">
